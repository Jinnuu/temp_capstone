{% extends "base.html" %}

{% block title %}로그인 | S&P{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-card__header">
            <h1 class="auth-card__title">로그인</h1>
            <p class="auth-card__desc">
                S&amp;P 운영 시스템에 로그인하여 식단, 예측, 재고 기능을 이용하세요.
            </p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="auth-form__field">
                <label for="id_username">아이디</label>
                <input type="text" name="username" id="id_username" required>
            </div>

            <div class="auth-form__field">
                <label for="id_password">비밀번호</label>
                <input type="password" name="password" id="id_password" required>
            </div>

            {% if form.errors %}
                <div class="alert alert--danger">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </div>
            {% endif %}

            <div class="auth-form__actions">
                <button type="submit" class="btn btn--dark auth-form__submit">로그인</button>
            </div>
        </form>

        <div class="auth-helper">
            계정이 없으신가요?
            <a href="{% url 'signup' %}" class="auth-helper__link">회원가입</a>
        </div>
    </div>
</section>
{% endblock %}
