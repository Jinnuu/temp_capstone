{% extends "base.html" %}

{% block title %}로그인 | S&P{% endblock %}

{% block content %}
<section class="row justify-content-center py-4 py-md-5">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="text-uppercase small fw-bold text-primary">Account</span>
                    <h1 class="h2 fw-bold mt-2 mb-2">로그인</h1>
                    <p class="text-muted mb-0">S&amp;P 계정으로 서비스에 접속하세요.</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">아이디</label>
                        <input
                            type="text"
                            name="{{ form.username.html_name }}"
                            id="{{ form.username.id_for_label }}"
                            value="{{ form.username.value|default_if_none:'' }}"
                            class="form-control"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="{{ form.password.id_for_label }}" class="form-label">비밀번호</label>
                        <input
                            type="password"
                            name="{{ form.password.html_name }}"
                            id="{{ form.password.id_for_label }}"
                            class="form-control"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">로그인</button>
                    </div>
                </form>

                <div class="text-center mt-4 text-muted small">
                    계정이 없으신가요?
                    <a href="{% url 'signup' %}" class="text-decoration-none fw-semibold">회원가입</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
