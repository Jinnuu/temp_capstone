{% extends "base.html" %}
{% block title %}식재료 등록 | FoodSense{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h3 mb-1">식재료 등록</h1>
      <p class="text-muted mb-0">재고 관리의 기준이 되는 식재료 정보를 등록합니다.</p>
    </div>
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#uploadModal">
      <i class="bi bi-file-earmark-excel"></i> 엑셀로 일괄 등록
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
            <div class="col-md-6">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
            </div>
          {% endfor %}
        </div>
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary">저장하기</button>
          <a href="{% url 'inventory:ingredient_list' %}" class="btn btn-outline-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">엑셀 파일 업로드</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="{% url 'inventory:ingredient_upload' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">엑셀(.xlsx) 또는 CSV 파일 선택</label>
            <input type="file" name="file" class="form-control" accept=".xlsx, .xls, .csv" required>
            <div class="form-text mt-2">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
          <button type="submit" class="btn btn-success">업로드 시작</button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
