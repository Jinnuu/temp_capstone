<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Capstone{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand me-4" href="/">Capstone</a>

            <div class="d-flex gap-3 align-items-center">
                <a class="nav-link text-white" href="/">홈</a>
                <a class="nav-link text-white" href="/inventory/ingredients/">식재료 목록</a>
                <a class="nav-link text-white" href="/admin/">관리자</a>

                {% if user.is_authenticated %}
                    <span class="text-white">{{ user.username }} 님</span>
                    <form method="post" action="/accounts/logout/" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-light">로그아웃</button>
                    </form>
                {% else %}
                    <a class="nav-link text-white" href="/accounts/login/">로그인</a>
                    <a class="nav-link text-white" href="/accounts/signup/">회원가입</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
