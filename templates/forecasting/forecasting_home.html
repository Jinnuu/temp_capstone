{% extends "base.html" %}

{% block title %}예측 | Capstone{% endblock %}

{% block content %}
<div class="p-4 bg-light rounded-3 border mb-4">
    <h1 class="h3 mb-2">식수 예측</h1>
    <p class="mb-0">날짜와 끼니를 기준으로 예상 식수를 예측하는 화면입니다.</p>
</div>

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">예측 입력 예시</h2>
        </div>

        <form>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">날짜</label>
                    <input type="date" class="form-control" value="{{ tomorrow|date:'Y-m-d' }}" disabled>

                </div>
                <div class="col-md-4">
                    <label class="form-label">끼니</label>
                    <select class="form-select" disabled>
                        <option>아침</option>
                        <option selected>점심</option>
                        <option>저녁</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <a href="{% url 'forecasting:prediction_create' %}" class="btn btn-dark w-100">
                        예측 실행
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0">예측 결과 예시</h2>
            <a href="{% url 'forecasting:prediction_list' %}" class="btn btn-outline-secondary btn-sm">
                결과 목록 보기
            </a>
        </div>
        <p class="mb-1">예상 식수: <strong>312명</strong></p>
        <p class="text-muted mb-0">Prototype 단계에서는 예측 결과 표시 흐름을 우선 구현합니다.</p>
    </div>
</div>

{% endblock %}
