{% extends "base.html" %}

{% block title %}식수 예측 실행 | S&P{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="page-header__title">식수 예측 실행</h1>
    <p class="page-header__desc">
        기준일을 선택하면 조식, 중식, 석식 예측 결과를 일괄 생성합니다.
    </p>
</section>

<section class="section-box">
    <h2 class="section-title">예측 조건 입력</h2>

    <form method="post" class="form-panel">
        {% csrf_token %}

        <div class="form-panel__field form-panel__field--wide">
            <label for="{{ form.prediction_date.id_for_label }}">
                {{ form.prediction_date.label }}
            </label>
            {{ form.prediction_date }}
            {% if form.prediction_date.errors %}
                <div class="alert alert--danger">
                    {{ form.prediction_date.errors }}
                </div>
            {% endif %}
        </div>

        <div class="form-panel__actions">
            <button type="submit" class="btn btn--dark">예측 결과 생성</button>
            <a href="{% url 'forecasting:prediction_list' %}" class="btn">결과 목록</a>
        </div>
    </form>
</section>
{% endblock %}
