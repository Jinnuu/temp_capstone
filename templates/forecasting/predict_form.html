{% extends "base.html" %}
{% block title %}식수 예측 실행 | S&P{% endblock %}
{% block content %}<section class="sp-page-title"><h1>식수 예측 실행</h1><p>기준일을 선택하면 조식, 중식, 석식 예측을 생성합니다.</p></section><section class="sp-action-row"><a href="{% url 'forecasting:prediction_calendar' %}" class="sp-btn">예측 캘린더</a><a href="{% url 'forecasting:prediction_list' %}" class="sp-btn">예측 결과 목록</a><a href="{% url 'forecasting:ingredient_requirement' %}" class="sp-btn">식재료 산출</a></section><section class="sp-panel sp-narrow-panel"><div class="sp-panel-head"><div><p>Prediction</p><h2>예측 조건 입력</h2></div></div><form method="post" class="sp-form">{% csrf_token %}<label><span>{{ form.prediction_date.label }}</span>{{ form.prediction_date }}{% if form.prediction_date.errors %}<small class="text-danger">{{ form.prediction_date.errors }}</small>{% endif %}</label><button type="submit" class="sp-btn sp-btn-primary">해당 날짜 예측 실행</button></form></section>{% endblock %}
