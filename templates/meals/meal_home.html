{% extends "base.html" %}

{% block title %}식단 | S&P{% endblock %}

{% block content %}
<div class="p-4 bg-light rounded-3 border mb-4">
    <h1 class="h3 mb-2">식단 관리</h1>
    <p class="mb-0">메뉴, 레시피, 날짜별 식단을 관리하는 화면입니다.</p>
</div>

<div class="row g-4">
    <div class="col-md-6">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h2 class="h5">메뉴 관리</h2>
                <p class="text-muted">급식 메뉴 등록 및 목록 조회</p>
                <ul class="mb-0">
                    <li><a href="/meals/menu_create/">메뉴 등록</a></li>
                    <li><a href="/meals/menu_list/">메뉴 목록 조회</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h2 class="h5">레시피 / 식단 관리</h2>
                <p class="text-muted">메뉴별 레시피와 날짜별 식단 구성</p>
                <ul class="mb-0">
                    <li><a href="/meals/recipe_create/">레시피 등록</a></li>
                    <li><a href="/meals/mealplan_create/">날짜별 식단 입력</a></li>
                    <li><a href="/meals/mealplan_list/">식단 조회</a></li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
