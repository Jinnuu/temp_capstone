{% extends "base.html" %}

{% block title %}메뉴 및 레시피 등록 | S&P{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="p-5 bg-white rounded-3 shadow-sm border">
        <div class="mb-4 text-center">
            <h1 class="h3 fw-bold text-dark">🍽️ 신규 메뉴 등록</h1>
            <p class="text-muted">식단 구성을 위해 메뉴의 종류와 레시피를 입력해주세요.</p>
        </div>

        <form id="recipe-form" method="POST">
            {% csrf_token %}
            
            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <label class="form-label fw-bold">메뉴 이름</label>
                    <input type="text" name="name" class="form-control form-control-lg" placeholder="예: 차돌박이 된장찌개" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">메뉴 카테고리</label>
                    <div class="d-flex flex-wrap gap-2">
                        <input type="radio" class="btn-check" name="category" id="type_main" value="메인" checked>
                        <label class="btn btn-outline-primary flex-fill" for="type_main">메인</label>

                        <input type="radio" class="btn-check" name="category" id="type_soup" value="국/찌개">
                        <label class="btn btn-outline-info flex-fill" for="type_soup">국/찌개</label>

                        <input type="radio" class="btn-check" name="category" id="type_side" value="밑반찬">
                        <label class="btn btn-outline-secondary flex-fill" for="type_side">밑반찬</label>

                        <input type="radio" class="btn-check" name="category" id="type_dessert" value="디저트">
                        <label class="btn btn-outline-warning flex-fill" for="type_dessert">디저트</label>

                        <input type="radio" class="btn-check" name="category" id="type_etc" value="기타">
                        <label class="btn btn-outline-dark flex-fill" for="type_etc">기타</label>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <label class="form-label fw-bold mb-0">식재료 및 사용량</label>
                    <button type="button" class="btn btn-outline-success btn-sm" onclick="addIngredient()">
                        + 식재료 추가
                    </button>
                </div>
                <div id="ingredient-list">
                    <div class="row g-3 mb-3 align-items-center ingredient-item">
                        <div class="col-md-5">
                            <input type="text" name="ing_name[]" class="form-control" placeholder="식재료명 (예: 양파)">
                        </div>
                        <div class="col-md-4">
                            <div class="input-group">
                                <input type="number" step="0.01" name="ing_amount[]" class="form-control" placeholder="사용량">
                                <span class="input-group-text bg-white border-start-0 text-muted">kg</span>
                            </div>
                        </div>
                        <div class="col-md-3 text-end">
                            <button type="button" class="btn btn-link text-danger p-0" onclick="removeIngredient(this)"><u>삭제</u></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                <button type="submit" class="btn btn-dark px-5">메뉴 등록 완료</button>
            </div>
        </form>
    </div>
</div>

<script>
    function addIngredient() {
        const list = document.getElementById('ingredient-list');
        const newItem = document.createElement('div');
        newItem.className = 'row g-3 mb-3 align-items-center ingredient-item';
        
        // 💡 자바스크립트로 생기는 칸에도 name="..." 속성을 똑같이 넣어줍니다!
        newItem.innerHTML = `
            <div class="col-md-5">
                <input type="text" name="ing_name[]" class="form-control" placeholder="식재료명 (예: 양파)">
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <input type="number" step="0.01" name="ing_amount[]" class="form-control" placeholder="사용량">
                    <span class="input-group-text bg-white border-start-0 text-muted">kg</span>
                </div>
            </div>
            <div class="col-md-3 text-end">
                <button type="button" class="btn btn-link text-danger p-0" onclick="removeIngredient(this)"><u>삭제</u></button>
            </div>
        `;
        list.appendChild(newItem);
    }

    function removeIngredient(btn) {
        const items = document.getElementsByClassName('ingredient-item');
        if (items.length > 1) {
            btn.closest('.ingredient-item').remove();
        } else {
            alert("최소 하나의 식재료는 입력해야 합니다.");
        }
    }
</script>
{% endblock %}
