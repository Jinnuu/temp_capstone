{% extends "base.html" %}

{% block title %}메뉴 등록 | S&P{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="page-header__title">메뉴 등록</h1>
    <p class="page-header__desc">
        신규 급식 메뉴를 등록하고 이후 레시피 및 식단에 연결합니다.
    </p>
</section>

<section class="section-box">
    <h2 class="section-title">메뉴 정보 입력</h2>

    <form method="post" class="form-panel" id="menu-create-form">
        {% csrf_token %}

        <div class="form-panel__field">
            <label for="name">메뉴명</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-panel__field">
            <label for="category">카테고리</label>
            <input type="text" id="category" name="category" required>
        </div>

        <div class="form-panel__field form-panel__field--wide">
            <label>식재료 구성</label>
            <div id="recipe-rows">
                <div class="recipe-row">
                    <input type="text" name="ing_name[]" placeholder="식재료명">
                    <input type="number" step="0.01" name="ing_amount[]" placeholder="소요량">
                </div>
            </div>
            <button type="button" class="btn btn--sm" onclick="addRecipeRow()">행 추가</button>
        </div>

        <div class="form-panel__actions">
            <button type="submit" class="btn btn--dark">저장</button>
            <a href="/meals/menu_list/" class="btn">목록으로</a>
        </div>
    </form>

    <script>
    function addRecipeRow() {
        const container = document.getElementById("recipe-rows");
        const row = document.createElement("div");
        row.className = "recipe-row";
        row.innerHTML = `
            <input type="text" name="ing_name[]" placeholder="식재료명">
            <input type="number" step="0.01" name="ing_amount[]" placeholder="소요량">
        `;
        container.appendChild(row);
    }
    </script>

</section>
{% endblock %}
