{% extends "base.html" %}

{% block title %}레시피 등록 | Capstone{% endblock %}

{% block content %}
<div class="p-4 bg-light rounded-3 border">
    <h1 class="h3 mb-3">레시피 등록</h1>
    <p class="text-muted">메뉴별 식재료와 사용량을 입력하는 화면입니다.</p>

    <form>
        <div class="mb-3">
            <label class="form-label">메뉴 선택</label>
            <select class="form-select">
                <option>김치찌개</option>
                <option>제육볶음</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">식재료</label>
            <input type="text" class="form-control" placeholder="예: 돼지고기">
        </div>
        <div class="mb-3">
            <label class="form-label">사용량</label>
            <input type="text" class="form-control" placeholder="예: 10kg">
        </div>
        <button type="button" class="btn btn-dark">등록</button>
    </form>
</div>
{% endblock %}
