{% extends "base.html" %}

{% block title %}레시피 등록 | S&P{% endblock %}

{% block content %}
<section class="page-header">
    <h1 class="page-header__title">레시피 등록</h1>
    <p class="page-header__desc">
        메뉴별 식재료와 수량을 연결하여 조리 기준 레시피를 등록합니다.
    </p>
</section>

<section class="section-box">
    <h2 class="section-title">레시피 정보 입력</h2>

    <form method="post" class="form-panel" id="recipe-create-form">
        {% csrf_token %}

        <div class="form-panel__field form-panel__field--wide">
            <label for="menu_id">대상 메뉴</label>
            <select id="menu_id" name="menu_id" required>
                <option value="">메뉴 선택</option>
                {% for menu in menus %}
                    <option value="{{ menu.id }}">{{ menu.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-panel__field form-panel__field--wide">
            <label>레시피 구성</label>
            <div id="ingredient-rows">
                <div class="recipe-row">
                    <select name="ingredient_id[]">
                        <option value="">식재료 선택</option>
                        {% for ingredient in ingredients %}
                            <option value="{{ ingredient.id }}">{{ ingredient.name }}</option>
                        {% endfor %}
                    </select>
                    <input type="number" step="0.01" name="required_amount[]" placeholder="소요량">
                </div>
            </div>
            <button type="button" class="btn btn--sm" onclick="addIngredientRow()">행 추가</button>
        </div>

        <div class="form-panel__actions">
            <button type="submit" class="btn btn--dark">저장</button>
            <a href="/meals/" class="btn">식단 홈</a>
        </div>
    </form>

    <script>
    function addIngredientRow() {
        const container = document.getElementById("ingredient-rows");
        const row = document.createElement("div");
        row.className = "recipe-row";
        row.innerHTML = `
            <select name="ingredient_id[]">
                <option value="">식재료 선택</option>
                {% for ingredient in ingredients %}
                    <option value="{{ ingredient.id }}">{{ ingredient.name|escapejs }}</option>
                {% endfor %}
            </select>
            <input type="number" step="0.01" name="required_amount[]" placeholder="소요량">
        `;
        container.appendChild(row);
    }
    </script>
</section>
{% endblock %}
