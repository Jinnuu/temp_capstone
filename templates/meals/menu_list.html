{% extends "base.html" %}

{% block title %}메뉴 목록 조회 | Capstone{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="p-4 bg-white rounded-3 shadow-sm border">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold text-dark">📋 등록 메뉴 관리</h1>
                <p class="text-muted mb-0">시스템에 등록된 전체 메뉴를 카테고리별로 확인하고 수정할 수 있습니다.</p>
            </div>
            <a href="{% url 'menu_create' %}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-lg"></i> 새 메뉴 등록
            </a>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" placeholder="메뉴명 검색...">
                </div>
            </div>
            <div class="col-md-8 text-end">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-secondary btn-sm active">전체</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm">메인</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm">국/찌개</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm">밑반찬</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm">디저트</button>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle border-top">
                <thead class="table-light">
                    <tr>
                        <th style="width: 8%;" class="text-center">ID</th>
                        <th style="width: 45%;">메뉴명</th>
                        <th style="width: 22%;" class="text-center">카테고리</th>
                        <th style="width: 25%;" class="text-center">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-center text-muted">1</td>
                        <td><span class="fw-bold text-dark">안동 찜닭</span></td>
                        <td class="text-center">
                            <span class="badge bg-primary px-3 py-2" style="min-width: 80px;">메인</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-dark me-1">레시피 수정</button>
                            <button class="btn btn-sm btn-outline-danger">삭제</button>
                        </td>
                    </tr>

                    <tr>
                        <td class="text-center text-muted">2</td>
                        <td><span class="fw-bold text-dark">얼큰 소고기 무국</span></td>
                        <td class="text-center">
                            <span class="badge bg-info text-dark px-3 py-2" style="min-width: 80px;">국/찌개</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-dark me-1">레시피 수정</button>
                            <button class="btn btn-sm btn-outline-danger">삭제</button>
                        </td>
                    </tr>

                    <tr>
                        <td class="text-center text-muted">3</td>
                        <td><span class="fw-bold text-dark">배추 겉절이</span></td>
                        <td class="text-center">
                            <span class="badge bg-secondary px-3 py-2" style="min-width: 80px;">밑반찬</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-dark me-1">레시피 수정</button>
                            <button class="btn btn-sm btn-outline-danger">삭제</button>
                        </td>
                    </tr>

                    <tr>
                        <td class="text-center text-muted">4</td>
                        <td><span class="fw-bold text-dark">조각 수박</span></td>
                        <td class="text-center">
                            <span class="badge bg-warning text-dark px-3 py-2" style="min-width: 80px;">디저트</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-dark me-1">레시피 수정</button>
                            <button class="btn btn-sm btn-outline-danger">삭제</button>
                        </td>
                    </tr>

                    <tr>
                        <td class="text-center text-muted">5</td>
                        <td><span class="fw-bold text-dark">쌀밥 (백미)</span></td>
                        <td class="text-center">
                            <span class="badge bg-dark px-3 py-2" style="min-width: 80px;">기타</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-dark me-1">레시피 수정</button>
                            <button class="btn btn-sm btn-outline-danger">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item disabled"><a class="page-link" href="#">이전</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">다음</a></li>
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
